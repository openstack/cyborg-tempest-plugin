- project:
    queue: cyborg
    templates:
      - check-requirements
      - tempest-plugin-jobs
    check:
      jobs:
        - cyborg-tempest
        - cyborg-tempest-2025-2
        - cyborg-tempest-2025-1
        - cyborg-tempest-2024-2
        - cyborg-tempest-ipv6-only
    gate:
      jobs:
        - cyborg-tempest
        - cyborg-tempest-ipv6-only

- job:
    name: cyborg-tempest
    description: |
      Cyborg devstack tempest tests job for >=Ussuri release
      run on python 3.
    parent: devstack-tempest
    timeout: 7800
    required-projects: &base_required_projects_master
      - openstack/cyborg
      - openstack/python-cyborgclient
      - openstack/tempest
      - openstack/cyborg-tempest-plugin
    vars: &base_vars
      devstack_plugins:
        cyborg: https://opendev.org/openstack/cyborg
      devstack_services:
        tempest: true
        s-account: false
        s-container: false
        s-object: false
        s-proxy: false
        c-api: false
        c-bak: false
        c-sch: false
        c-vol: false
        cinder: false
      devstack_localrc:
        TEMPEST_PLUGINS: "/opt/stack/cyborg-tempest-plugin"
      tempest_test_regex: cyborg_tempest_plugin
      tox_envlist: all
    irrelevant-files: &base_irrelevant_files
      - ^.*\.rst$
      - ^doc/.*$
      - ^setup.cfg$
      - ^releasenotes/.*$
      - ^(test-|)requirements.txt$
      - ^.git.*$
      - ^tox.ini$

- job:
    name: cyborg-tempest-ipv6-only
    parent: devstack-tempest-ipv6
    description: |
      Cyborg devstack tempest tests job for IPv6-only deployment
    voting: false
    timeout: 7800
    required-projects: *base_required_projects_master
    vars: *base_vars
    irrelevant-files: *base_irrelevant_files


# TODO(gmann): As per the 2025.1 testing runtime, we need to run at least
# one job on jammy. This job is running in 2025.1 gate so remove it once
# 2025.1 is EOL.
- job:
    name: cyborg-tempest-jammy
    description: This is integrated job testing on Ubuntu jammy(22.04)
    parent: cyborg-tempest
    nodeset: openstack-single-node-jammy

- job:
    name: cyborg-tempest-2025-2
    parent: cyborg-tempest
    nodeset: openstack-single-node-noble
    override-checkout: stable/2025.2

- job:
    name: cyborg-tempest-2025-1
    parent: cyborg-tempest
    nodeset: openstack-single-node-noble
    override-checkout: stable/2025.1

- job:
    name: cyborg-tempest-2024-2
    parent: cyborg-tempest
    nodeset: openstack-single-node-jammy
    override-checkout: stable/2024.2
